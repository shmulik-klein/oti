<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Oti - אוֹתִיּוֹת</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            text-align: center;
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }
        
        .letter-display {
            background: white;
            border-radius: 24px;
            padding: 60px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            margin-bottom: 40px;
            cursor: pointer;
            transition: transform 0.1s;
            -webkit-tap-highlight-color: transparent;
        }
        
        .letter-display:active {
            transform: scale(0.98);
        }
        
        .tap-hint {
            font-size: 14px;
            color: #bbb;
            margin-top: 10px;
        }
        
        .hebrew-letter {
            font-size: 180px;
            color: #333;
            line-height: 1;
            margin-bottom: 20px;
        }
        
        .letter-name {
            font-size: 48px;
            color: #666;
            margin-bottom: 10px;
        }
        
        .letter-transliteration {
            font-size: 24px;
            color: #999;
        }
        
        .counter {
            font-size: 20px;
            color: #aaa;
            margin-bottom: 30px;
        }
        
        .navigation {
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        
        .nav-btn {
            background: #007AFF;
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 24px;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        
        .nav-btn:active {
            transform: scale(0.95);
            background: #0056b3;
        }
        
        .nav-btn:hover {
            background: #0056b3;
        }
        
        .title {
            font-size: 32px;
            color: #333;
            margin-bottom: 20px;
        }
        
        .mode-toggle {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .mode-btn {
            background: #e0e0e0;
            color: #666;
            border: none;
            padding: 10px 18px;
            font-size: 14px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        
        .mode-btn.active {
            background: #007AFF;
            color: white;
        }
        
        .word-category {
            font-size: 14px;
            color: #4a90d9;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        
        .word-translation {
            font-size: 28px;
            color: #4CAF50;
            margin-top: 10px;
        }
        
        .nikud-name {
            font-size: 24px;
            color: #4a90d9;
            margin-bottom: 5px;
        }
        
        .quiz-container {
            display: none;
        }
        
        .quiz-container.active {
            display: block;
        }
        
        .learn-container {
            display: block;
        }
        
        .learn-container.hidden {
            display: none;
        }
        
        .quiz-question {
            font-size: 72px;
            margin-bottom: 30px;
        }
        
        .quiz-hint {
            font-size: 20px;
            color: #666;
            margin-bottom: 30px;
        }
        
        .quiz-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .quiz-option {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 20px;
            font-size: 28px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .quiz-option:active {
            transform: scale(0.98);
        }
        
        .quiz-option.correct {
            background: #4CAF50;
            color: white;
            border-color: #4CAF50;
        }
        
        .quiz-option.wrong {
            background: #f44336;
            color: white;
            border-color: #f44336;
        }
        
        .quiz-score {
            font-size: 24px;
            color: #333;
            margin-bottom: 20px;
        }
        
        .quiz-nav {
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        
        .quiz-type-toggle {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
        }
        
        .quiz-type-btn {
            background: #FF9800;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 14px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .quiz-type-btn.active {
            background: #F57C00;
            font-weight: bold;
        }
        
        .stories-container {
            display: none;
        }
        
        .stories-container.active {
            display: block;
        }
        
        .story-card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .story-card:active {
            transform: scale(0.98);
        }
        
        .story-title {
            font-size: 28px;
            color: #333;
            margin-bottom: 10px;
        }
        
        .story-preview {
            font-size: 18px;
            color: #666;
        }
        
        .story-reader {
            background: white;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            max-height: 70vh;
            overflow-y: auto;
        }
        
        .story-full-text {
            font-size: 36px;
            color: #333;
            margin-bottom: 30px;
            line-height: 1.8;
            text-align: right;
        }
        
        .story-full-translation {
            font-size: 20px;
            color: #888;
            font-style: italic;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }
            color: #aaa;
            margin-bottom: 20px;
        }
        
        @media (max-width: 600px) {
            .hebrew-letter {
                font-size: 120px;
            }
            .letter-name {
                font-size: 36px;
            }
            .letter-display {
                padding: 40px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">אוֹתִיּוֹת</h1>
        
        <div class="mode-toggle">
            <button class="mode-btn active" id="mode-letters">אוֹתִיּוֹת</button>
            <button class="mode-btn" id="mode-nikud">נִיקּוּד</button>
            <button class="mode-btn" id="mode-words">מִלִּים</button>
            <button class="mode-btn" id="mode-stories">סִפּוּרִים</button>
            <button class="mode-btn" id="mode-quiz">חִבּוּר</button>
        </div>
        
        <div class="quiz-type-toggle" id="quiz-type-container">
            <button class="quiz-type-btn active" id="quiz-letter-name">אוֹת → שֵׁם</button>
            <button class="quiz-type-btn" id="quiz-name-letter">שֵׁם → אוֹת</button>
        </div>
        
        <div class="learn-container" id="learn-container">
            <div class="letter-display" id="letter-display">
            <div class="word-category" id="category"></div>
            <div class="hebrew-letter" id="letter">א</div>
            <div class="letter-name" id="name">אלף</div>
            <div class="nikud-name" id="nikud-name"></div>
            <div class="letter-transliteration" id="transliteration">alef</div>
            <div class="word-translation" id="translation"></div>
            <div class="tap-hint">Tap to hear</div>
        </div>
        
        <div class="counter">
            <span id="current">1</span> / <span id="total">22</span>
        </div>
        
        <div class="navigation">
            <button class="nav-btn" id="prev">←</button>
            <button class="nav-btn" id="next">→</button>
        </div>
        </div>
        
        <div class="quiz-container" id="quiz-container">
            <div class="quiz-score" id="quiz-score"></div>
            <div class="quiz-question" id="quiz-question"></div>
            <div class="quiz-hint" id="quiz-hint"></div>
            <div class="quiz-options" id="quiz-options"></div>
            <div class="quiz-nav">
                <button class="nav-btn" id="quiz-next">Next</button>
            </div>
        </div>
        
        <div class="stories-container" id="stories-container">
            <div class="stories-list" id="stories-list"></div>
            <div class="story-reader" id="story-reader" style="display: none;">
                <div class="story-full-text" id="story-full-text"></div>
                <div class="story-full-translation" id="story-full-translation"></div>
                <div style="margin-top: 20px;">
                    <button class="mode-btn" id="back-to-stories">Back to Stories</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="web.js"></script>
</body>
</html>
